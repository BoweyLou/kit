repos:
  - repo: local
    hooks:
      - id: doc-contract
        name: documentation contract
        entry: python3 scripts/check_doc_impact.py --staged
        language: system
        pass_filenames: false

      - id: agent-instruction-lint
        name: local agent instruction lint
        entry: python3 scripts/lint_agent_docs.py --strict-paths
        language: system
        pass_filenames: false

      - id: self-dogfood-boundary
        name: self-dogfood boundary
        entry: python3 scripts/check_self_dogfood_boundary.py
        language: system
        pass_filenames: false

      - id: versioning
        name: local versioning gate
        entry: python3 scripts/check_versioning.py --staged
        language: system
        pass_filenames: false
